<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Sutra | Vedic Intelligence</title>
    <style>
        :root { --accent: #D4AF37; --bg: #0A0A0A; --card: #161616; --text: #E0E0E0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 420px; width: 100%; text-align: center; }
        h1 { letter-spacing: 4px; color: var(--accent); margin-bottom: 5px; font-size: 1.8rem; }
        .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 30px; text-transform: uppercase; }
        
        /* Action UI */
        .btn-scan { background: var(--accent); color: black; padding: 20px; border-radius: 15px; font-weight: bold; cursor: pointer; display: block; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2); transition: transform 0.2s; }
        .btn-scan:active { transform: scale(0.98); }
        #upload { display: none; }
        
        /* Processing UI */
        #processing { display: none; margin-top: 30px; width: 100%; }
        #progress-container { width: 100%; background: #222; height: 6px; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.2s; }
        #status-text { font-size: 0.85rem; color: var(--accent); font-style: italic; }

        /* Results UI */
        #output { display: none; width: 100%; margin-top: 20px; animation: fadeIn 0.6s ease; }
        .score-circle { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--accent); margin: 0 auto 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(212, 175, 55, 0.05); }
        .score-val { font-size: 1.8rem; font-weight: bold; color: var(--accent); }
        .score-label { font-size: 0.6rem; text-transform: uppercase; color: #888; }
        
        .kcal-tag { background: #222; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; color: var(--accent); display: inline-block; margin-bottom: 20px; }
        
        .card { background: var(--card); border-radius: 18px; padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--accent); text-align: left; line-height: 1.5; }
        .antidote { margin-top: 12px; padding-top: 12px; border-top: 1px solid #333; font-size: 0.85rem; color: #aaa; font-style: italic; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>FOOD SUTRA</h1>
        <div class="subtitle">Ancient Logic • Modern Intelligence</div>

        <label for="upload" class="btn-scan">PHOTO SCAN MENU</label>
        <input type="file" id="upload" accept="image/*" capture="environment">

        <div id="processing">
            <div id="progress-container"><div id="progress-bar"></div></div>
            <div id="status-text">Waking up Veda Engine...</div>
        </div>

        <div id="output">
            <div class="score-circle">
                <span class="score-label">Harmony</span>
                <span class="score-val" id="score-num">--</span>
            </div>
            <div class="kcal-tag" id="kcal-num">--</div>
            <div id="details"></div>
            <button onclick="location.reload()" style="background:none; border:1px solid #444; color:#888; padding:10px; border-radius:10px; margin-top:20px; cursor:pointer;">New Scan</button>
        </div>
    </div>

    <script src="tesseract.min.js"></script>
    <script src="logic.js"></script>
    <script>
        const upload = document.getElementById('upload');
        const bar = document.getElementById('progress-bar');
        const status = document.getElementById('status-text');

        upload.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('processing').style.display = 'block';
            document.getElementById('output').style.display = 'none';

            // Start Tesseract Worker
            const worker = await Tesseract.createWorker({
                logger: m => {
                    if (m.status === 'recognizing text') {
                        const p = Math.floor(m.progress * 100);
                        bar.style.width = p + "%";
                        status.innerText = `Consulting Sutras: ${p}%`;
                    }
                }
            });

            await worker.loadLanguage('eng');
            await worker.initialize('eng');
            const { data: { text } } = await worker.recognize(file);
            await worker.terminate();

            const result = FoodSutraLogic.check(text);
            render(result);
        };

        function render(res) {
            document.getElementById('processing').style.display = 'none';
            document.getElementById('output').style.display = 'block';
            
            document.getElementById('score-num').innerText = res.score + "%";
            document.getElementById('kcal-num').innerText = res.calories > 0 
                ? `Energy Estimate: ~${res.calories} kcal` 
                : "Energy: Light / Unrecognized";

            const details = document.getElementById('details');
            details.innerHTML = `<p style="font-size:0.7rem; color:#555; margin-bottom:15px;">Detected: ${res.items.join(', ') || 'N/A'}</p>`;

            if (res.analysis.length === 0) {
                details.innerHTML += `<div class="card"><strong>✓ High Harmony</strong><br>These choices align with your digestive fire (Agni). No toxic clashes found.</div>`;
            } else {
                res.analysis.forEach(item => {
                    details.innerHTML += `
                        <div class="card">
                            <strong style="color:var(--accent)">${item.severity} ALERT</strong><br>
                            ${item.msg}
                            <div class="antidote">💡 Antidote: ${item.antidote}</div>
                        </div>`;
                });
            }
        }
    </script>
</body>
</html>
