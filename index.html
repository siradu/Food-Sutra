<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Food Sutra | Menu Architect</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --gold: #d4af37; --dark: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 450px; width: 100%; }
        h1 { color: var(--gold); font-size: 2rem; margin-bottom: 5px; }
        p.subtitle { color: #888; margin-top: 0; margin-bottom: 30px; }
        .btn { background: var(--gold); color: #000; padding: 18px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; display: block; width: 80%; margin: 20px auto; text-align: center; border: none; font-size: 1rem; }
        #camera-input { display: none; }
        #loader { display: none; margin: 20px 0; color: var(--gold); font-style: italic; }
        #results { display: none; background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: left; }
        .warning { color: #ff6b6b; border-left: 3px solid #ff6b6b; padding-left: 10px; margin: 15px 0; font-size: 0.9rem; }
        .safe { color: #51cf66; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>FOOD SUTRA</h1>
        <p class="subtitle">Ancient Logic • Modern Menu</p>
        
        <label for="camera-input" class="btn">SCAN MENU</label>
        <input type="file" id="camera-input" accept="image/*" capture="environment">

        <div id="loader">Consulting Ancient Sutras...</div>

        <div id="results">
            <div id="detected-items" style="margin-bottom: 15px; font-weight: bold;"></div>
            <div id="analysis-output"></div>
        </div>
    </div>

    <script src="tesseract.min.js"></script>
    <script src="logic.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        const input = document.getElementById('camera-input');
        const loader = document.getElementById('loader');
        const results = document.getElementById('results');

        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            loader.style.display = 'block';
            results.style.display = 'none';

            Tesseract.recognize(file, 'eng').then(({ data: { text } }) => {
                const analysis = FoodSutraLogic.check(text);
                renderResults(analysis);
            }).finally(() => {
                loader.style.display = 'none';
            });
        };

        function renderResults(data) {
    results.style.display = 'block';
    
    // Header with Calorie Estimate
    const calDisplay = data.calories > 0 ? `<br><span style="color:var(--gold); font-size:0.8rem;">Est. Energy: ~${data.calories} kcal</span>` : '';
    
    document.getElementById('detected-items').innerHTML = 
        `Items: ${data.found.join(', ') || 'None'}` + calDisplay;
    
    const output = document.getElementById('analysis-output');
    output.innerHTML = '';

    if (data.conflicts.length > 0) {
        data.conflicts.forEach(c => {
            output.innerHTML += `<div class="warning">
                <strong>Conflict: ${c.a.toUpperCase()} + ${c.b.toUpperCase()}</strong><br>
                ${c.reason}
            </div>`;
        });
    } else if (data.found.length > 0) {
        output.innerHTML = '<div class="safe">✓ Ancient Wisdom Approved. This combination maintains your digestive fire (Agni).</div>';
    } else {
        output.innerHTML = '<div>Please try a clearer photo of the menu.</div>';
    }
}
    </script>
</body>
</html>
