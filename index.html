<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Sutra | Pure Logic</title>
    <style>
        :root { --accent: #D4AF37; --bg: #0A0A0A; --card: #161616; --text: #E0E0E0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 400px; width: 100%; text-align: center; }
        h1 { letter-spacing: 4px; color: var(--accent); margin-bottom: 20px; }
        .btn-scan { background: var(--accent); color: black; padding: 20px; border-radius: 15px; font-weight: bold; cursor: pointer; display: block; text-decoration: none; }
        #upload { display: none; }
        #processing { display: none; margin-top: 20px; }
        #progress-bar { width: 0%; height: 6px; background: var(--accent); transition: width 0.2s; border-radius: 10px; }
        #output { display: none; width: 100%; margin-top: 20px; }
        .score-circle { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--accent); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--accent); font-weight: bold; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--accent); text-align: left; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="container">
        <h1>FOOD SUTRA</h1>
        <label for="upload" class="btn-scan">SCAN MENU</label>
        <input type="file" id="upload" accept="image/*" capture="environment">

        <div id="processing">
            <div style="width:100%; background:#222; height:6px; border-radius:10px; margin-bottom:10px;">
                <div id="progress-bar"></div>
            </div>
            <div id="status">Applying Vedic Logic...</div>
        </div>

        <div id="output">
            <div class="score-circle" id="score-num">0%</div>
            <p id="detected-list" style="color:#888; font-size:0.8rem; margin-bottom:20px;"></p>
            <div id="details"></div>
            <button onclick="location.reload()" style="background:none; border:1px solid #444; color:#666; padding:8px 20px; border-radius:20px; margin-top:20px; cursor:pointer;">Clear & Restart</button>
        </div>
    </div>

    <script src="tesseract.min.js"></script>
    <script src="logic.js"></script>
    <script>
        const upload = document.getElementById('upload');
        const bar = document.getElementById('progress-bar');
        const status = document.getElementById('status');

        upload.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('processing').style.display = 'block';
            document.getElementById('output').style.display = 'none';

            const worker = await Tesseract.createWorker({
                logger: m => {
                    if (m.status === 'recognizing text') {
                        const p = Math.floor(m.progress * 100);
                        bar.style.width = p + "%";
                        status.innerText = `Analyzing: ${p}%`;
                    }
                }
            });

            await worker.loadLanguage('eng');
            await worker.initialize('eng');
            const { data: { text } } = await worker.recognize(file);
            await worker.terminate();

            const result = FoodSutraLogic.runAnalysis(text);
            
            document.getElementById('processing').style.display = 'none';
            document.getElementById('output').style.display = 'block';
            
            document.getElementById('score-num').innerText = result.harmonyScore + "%";
            document.getElementById('detected-list').innerText = "Found: " + (result.itemsFound.join(', ') || "No recognizable items");
            
            const details = document.getElementById('details');
            details.innerHTML = "";

            if (result.alerts.length === 0) {
                details.innerHTML = `<div class="card"><strong>✓ Perfect Harmony</strong><br>Your selection is balanced according to ancient sutras.</div>`;
            } else {
                result.alerts.forEach(a => {
                    details.innerHTML += `<div class="card"><strong style="color:var(--accent)">${a.severity}</strong><br>${a.msg}</div>`;
                });
            }
        };
    </script>
</body>
</html>
