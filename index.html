<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Sutra | Vedic AI</title>
    <style>
        :root { --accent: #D4AF37; --bg: #0A0A0A; --card: #161616; --text: #E0E0E0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 400px; width: 100%; text-align: center; }
        h1 { letter-spacing: 4px; color: var(--accent); margin-bottom: 20px; }
        .btn-scan { background: var(--accent); color: black; padding: 20px; border-radius: 15px; font-weight: bold; cursor: pointer; display: block; }
        #upload { display: none; }
        #processing { display: none; margin-top: 20px; }
        #progress-bar { width: 0%; height: 6px; background: var(--accent); transition: width 0.2s; border-radius: 10px; }
        #output { display: none; width: 100%; margin-top: 20px; }
        .score-circle { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--accent); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--accent); font-weight: bold; }
        .kcal-box { color: var(--accent); background: #222; padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 20px; font-size: 0.9rem; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--accent); text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>FOOD SUTRA</h1>
        <label for="upload" class="btn-scan">SCAN MENU</label>
        <input type="file" id="upload" accept="image/*" capture="environment">

        <div id="processing">
            <div style="width:100%; background:#222; height:6px; border-radius:10px; margin-bottom:10px;">
                <div id="progress-bar"></div>
            </div>
            <div id="status">Reading Menu...</div>
        </div>

        <div id="output">
            <div class="score-circle" id="score-num">0%</div>
            <div class="kcal-box" id="kcal-num">0 kcal</div>
            <div id="details"></div>
        </div>
    </div>

    <script src="tesseract.min.js"></script>
    <script src="logic.js?v=1.1"></script> <script>
        const upload = document.getElementById('upload');
        const bar = document.getElementById('progress-bar');
        const status = document.getElementById('status');

        upload.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('processing').style.display = 'block';
            document.getElementById('output').style.display = 'none';

            const worker = await Tesseract.createWorker({
                logger: m => {
                    if (m.status === 'recognizing text') {
                        const p = Math.floor(m.progress * 100);
                        bar.style.width = p + "%";
                        status.innerText = `Analyzing: ${p}%`;
                    }
                }
            });

            await worker.loadLanguage('eng');
            await worker.initialize('eng');
            const { data: { text } } = await worker.recognize(file);
            await worker.terminate();

            // CALLING THE LOGIC
            const result = FoodSutraLogic.calculate(text);
            
            document.getElementById('processing').style.display = 'none';
            document.getElementById('output').style.display = 'block';
            
            // FILLING THE DATA
            document.getElementById('score-num').innerText = result.finalScore + "%";
            document.getElementById('kcal-num').innerText = result.totalKcal + " kcal detected";
            
            const details = document.getElementById('details');
            details.innerHTML = `<p style="color:#666; font-size:0.7rem;">Items: ${result.foundItems.join(', ')}</p>`;

            if (result.clashes.length === 0) {
                details.innerHTML += `<div class="card">✓ Harmony Detected.</div>`;
            } else {
                result.clashes.forEach(c => {
                    details.innerHTML += `<div class="card"><strong style="color:var(--accent)">${c.severity}</strong><br>${c.msg}</div>`;
                });
            }
        };
    </script>
</body>
</html>
