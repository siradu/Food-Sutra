<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Sutra Intelligence</title>
    <style>
        :root { --accent: #D4AF37; --bg: #0A0A0A; --card: #161616; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .score-circle { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--accent); margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin: 15px 0; text-align: left; border-left: 4px solid var(--accent); }
        .antidote { font-size: 0.85rem; color: #aaa; margin-top: 10px; font-style: italic; }
        .btn-scan { background: var(--accent); color: black; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; display: inline-block; }
        #loader { display: none; margin-top: 20px; color: var(--accent); }
    </style>
</head>
<body>
    <h1 style="letter-spacing: 2px;">FOOD SUTRA</h1>
    <p style="color: #666;">Vedic Intelligence Engine</p>

    <label for="upload" class="btn-scan">SCAN MENU</label>
    <input type="file" id="upload" accept="image/*" capture="environment" style="display:none">

    <div id="loader">Processing Sūtras...</div>

    <div id="output" style="display:none">
        <div class="score-circle" id="score-val">--</div>
        <p id="cal-val" style="color: #888;"></p>
        <div id="details"></div>
    </div>

    <script src="tesseract.min.js"></script>
    <script src="logic.js"></script>
    <script>
        const input = document.getElementById('upload');
        input.onchange = async (e) => {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('output').style.display = 'none';
            
            const file = e.target.files[0];
            Tesseract.recognize(file, 'eng').then(({ data: { text } }) => {
                const res = FoodSutraLogic.check(text);
                show(res);
            }).finally(() => {
                document.getElementById('loader').style.display = 'none';
            });
        };

        function show(res) {
            document.getElementById('output').style.display = 'block';
            document.getElementById('score-val').innerText = res.score + "%";
            document.getElementById('cal-val').innerText = "~" + res.calories + " kcal detected";
            
            const details = document.getElementById('details');
            details.innerHTML = "";

            if(res.analysis.length === 0) {
                details.innerHTML = `<div class="card"><strong>✓ Perfect Harmony</strong><br>These items work well together for your digestion.</div>`;
            } else {
                res.analysis.forEach(item => {
                    details.innerHTML += `
                        <div class="card">
                            <strong style="color:var(--accent)">${item.score} ALERT</strong><br>
                            ${item.msg}
                            <div class="antidote">💡 Antidote: ${item.antidote}</div>
                        </div>
                    `;
                });
            }
        }
    </script>
</body>
</html>
