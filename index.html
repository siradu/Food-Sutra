<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Sutra | Instant</title>
    <style>
        :root { --accent: #D4AF37; --bg: #0A0A0A; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 400px; width: 100%; text-align: center; }
        .btn-scan { background: var(--accent); color: black; padding: 20px; border-radius: 15px; font-weight: bold; cursor: pointer; display: block; margin-top: 20px; }
        #upload { display: none; }
        #loader { display: none; margin-top: 20px; }
        .progress-box { width: 100%; background: #222; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 10px; }
        #bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.1s; }
        #output { display: none; margin-top: 20px; width: 100%; }
        .card { background: #161616; padding: 15px; border-radius: 12px; border-left: 4px solid var(--accent); text-align: left; margin-bottom: 10px; }
        .score { font-size: 2rem; color: var(--accent); font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="letter-spacing: 3px;">FOOD SUTRA</h1>
        <p style="color: #666; font-size: 0.8rem;">Vedic Logic Engine</p>

        <label for="upload" class="btn-scan" id="label-text">TAP TO SCAN MENU</label>
        <input type="file" id="upload" accept="image/*" capture="environment">

        <div id="loader">
            <div id="status">Waking up Engine...</div>
            <div class="progress-box"><div id="bar"></div></div>
        </div>

        <div id="output">
            <div class="score" id="score-num">0%</div>
            <div id="results-area"></div>
            <button onclick="location.reload()" style="background:none; border:1px solid #333; color:#555; padding:10px; margin-top:20px; border-radius:10px;">Reset</button>
        </div>
    </div>

    <script src="tesseract.min.js"></script>
    <script src="logic.js"></script>
    <script>
        const upload = document.getElementById('upload');
        const bar = document.getElementById('bar');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');

        // SPEED TRICK: Initialize worker immediately on page load
        let worker = null;
        async function initWorker() {
            worker = await Tesseract.createWorker({
                logger: m => {
                    if (m.status === 'recognizing text') {
                        const p = Math.floor(m.progress * 100);
                        bar.style.width = p + "%";
                        status.innerText = `Reading: ${p}%`;
                    }
                }
            });
            await worker.loadLanguage('eng');
            await worker.initialize('eng');
            document.getElementById('label-text').innerText = "READY: SCAN MENU";
        }
        initWorker();

        upload.onchange = async (e) => {
            if (!worker) { alert("Engine still warming up... try in 2 seconds"); return; }
            const file = e.target.files[0];
            if (!file) return;

            loader.style.display = 'block';
            document.getElementById('output').style.display = 'none';

            // FAST RECOGNITION
            const { data: { text } } = await worker.recognize(file);
            
            const res = FoodSutraLogic.runAnalysis(text);
            
            loader.style.display = 'none';
            document.getElementById('output').style.display = 'block';
            document.getElementById('score-num').innerText = res.harmonyScore + "%";
            
            const area = document.getElementById('results-area');
            area.innerHTML = `<p style="color:#555; font-size:0.7rem;">Detected: ${res.itemsFound.join(', ') || 'N/A'}</p>`;

            if (res.alerts.length === 0) {
                area.innerHTML += `<div class="card"><strong>✓ Harmony</strong><br>No toxic clashes found.</div>`;
            } else {
                res.alerts.forEach(a => {
                    area.innerHTML += `<div class="card"><strong>${a.severity}</strong><br>${a.msg}</div>`;
                });
            }
        };
    </script>
</body>
</html>
